name: Deploy KSSMI Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Install PHPMailer
        run: |
          cd public
          composer install --no-dev --optimize-autoloader

      - name: Create email logs file
        run: |
          touch dist/email-logs.json
          echo "[]" > dist/email-logs.json

      - name: Copy PHP files to dist
        run: |
          cp public/send-mail.php dist/
          cp public/email-logs.php dist/
          cp public/php-status.php dist/
          cp -r public/vendor dist/

      - name: Deploy to Hetzner Server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          SOURCE: "dist/"
          TARGET: "/home/kssmi.com/public_html"
          ARGS: "-avz --delete --exclude=email-logs.json --exclude=.email_logs_password"

      - name: Set file permissions
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/kssmi.com/public_html
            chown -R kssmi:kssmi *
            find . -type d -exec chmod 755 {} \;
            find . -type f -exec chmod 644 {} \;
            if [ -f email-logs.json ]; then chmod 666 email-logs.json; fi
            if [ -f .email_logs_password ]; then chmod 600 .email_logs_password; fi

      - name: Deployment Complete
        run: |
          echo "Deployment complete!"
          echo "Visit: https://kssmi.com"
