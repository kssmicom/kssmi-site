name: Deploy KSSMI Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Install PHPMailer
        run: |
          cd public
          composer install --no-dev --optimize-autoloader

      - name: Create email logs file
        run: |
          touch dist/email-logs.json
          echo "[]" > dist/email-logs.json

      - name: Copy PHP files to dist
        run: |
          cp public/send-mail.php dist/
          cp public/email-logs.php dist/
          cp public/php-status.php dist/
          cp -r public/vendor dist/

      - name: Deploy to Hetzner Server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          SOURCE: "dist/"
          TARGET: "/home/kssmi.com/public_html"
          ARGS: "-avz --delete --exclude=email-logs.json --exclude=.email_logs_password --exclude=.email_reset_tokens.json"

      - name: Set file permissions
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/kssmi.com/public_html

            # Set ownership (may require sudo — fail silently if not available)
            chown -R kssmi:kssmi * 2>/dev/null || sudo chown -R kssmi:kssmi * 2>/dev/null || true

            # Set directory permissions
            find . -type d -exec chmod 755 {} \; 2>/dev/null || true

            # Set file permissions
            find . -type f -exec chmod 644 {} \; 2>/dev/null || true

            # Make PHP files executable
            find . -name "*.php" -exec chmod 755 {} \; 2>/dev/null || true

            # Create writable files if they don't exist
            touch email-logs.json 2>/dev/null || true
            touch .email_logs_password 2>/dev/null || true
            touch .email_reset_tokens.json 2>/dev/null || true

            # Set writable permissions for data files (PHP needs to write to these)
            chmod 666 email-logs.json .email_logs_password .email_reset_tokens.json 2>/dev/null || true

            # Set ownership for data files
            chown kssmi:kssmi email-logs.json .email_logs_password .email_reset_tokens.json 2>/dev/null || sudo chown kssmi:kssmi email-logs.json .email_logs_password .email_reset_tokens.json 2>/dev/null || true

      - name: Deployment Complete
        run: |
          echo "Deployment complete!"
          echo "Visit: https://kssmi.com"
